<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Private Control Room</title>
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  
  <!-- Firebase SDK (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="admin-login-body">

  <div class="admin-login-card">
    <div class="admin-login-header">
      <h2>Maa Sukriti Pharmaceuticals</h2>
      <p>Private Control Room Login</p>
    </div>
    
    <div class="alert alert-error" id="loginErrorMsg" style="display: none; background-color: var(--error-light); color: var(--error); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; border-left: 4px solid var(--error);">
      Invalid credentials. Please try again.
    </div>
    
    <form id="adminLoginForm" onsubmit="executeLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="admin@mspbharat.com" required>
      </div>
      
      <div class="form-group" style="margin-bottom: var(--spacing-md);">
        <label class="form-label" for="loginPass">Password</label>
        <input type="password" id="loginPass" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">
        Log In To Control Room
      </button>
    </form>
    
    <div style="margin-top: 1.5rem; background-color: var(--light); padding: 1rem; border-radius: var(--radius-md); font-size: 0.8rem; border: 1.2px solid var(--gray-medium);">
      <p style="font-weight: 700; color: var(--dark); margin-bottom: 2px;">🧪 Developer Notice:</p>
      <p style="color: var(--gray-dark); margin-bottom: 4px;">If Firebase is not configured, the site runs in demo mode. Access the dashboard with:</p>
      <div style="font-family: monospace; background: var(--white); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--gray-light); margin-bottom: 4px;">
        Email: admin@mspbharat.com<br>
        Password: admin123
      </div>
    </div>
  </div>

  <!-- Lucide icons cdn -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  
  <script>
    // Login form execution handler
    async function executeLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPass").value.trim();
      const btn = document.getElementById("loginBtn");
      const errBox = document.getElementById("loginErrorMsg");
      
      errBox.style.display = "none";
      btn.disabled = true;
      btn.innerText = "Signing in...";
      
      try {
        await handleAdminLogin(email, pass);
      } catch (err) {
        btn.disabled = false;
        btn.innerText = "Log In To Control Room";
        errBox.innerText = err.message || "Failed to authenticate.";
        errBox.style.display = "block";
      }
    }

    lucide.createIcons();
  </script>
</body>
</html>
