<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Divisions | Private Control Room</title>
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  
  <!-- Firebase SDK (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

  <div class="admin-layout">
    
    <!-- Left Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-top">
        <a href="dashboard.html" class="logo-wrapper" style="display:flex; flex-direction:column; gap:4px; align-items:flex-start;">
          <img src="../assets/logos/logo.png" alt="MSP Logo" class="logo-img" style="height:44px;">
          <div style="display:flex; flex-direction:column; gap:2px;">
            <div class="logo-text">MAA SUKRITI PHARMACEUTICALS</div>
            <span style="font-size:0.6rem; color:var(--primary); font-weight:700; letter-spacing:1px; background:#fff; padding:2px 6px; border-radius:3px; text-transform:uppercase; width:fit-content; text-align:center;">Control Room</span>
          </div>
        </a>
        <ul class="admin-sidebar-menu">
          <li>
            <a href="dashboard.html" class="admin-sidebar-link">
              <i data-lucide="layout-dashboard" style="width:18px; height:18px;"></i> Dashboard
            </a>
          </li>
          <li>
            <a href="products.html" class="admin-sidebar-link">
              <i data-lucide="pill" style="width:18px; height:18px;"></i> Products
            </a>
          </li>
          <li>
            <a href="categories.html" class="admin-sidebar-link active">
              <i data-lucide="tag" style="width:18px; height:18px;"></i> Categories
            </a>
          </li>
          <li>
            <a href="enquiries.html" class="admin-sidebar-link">
              <i data-lucide="mail" style="width:18px; height:18px;"></i> Enquiries
            </a>
          </li>
        </ul>
      </div>
      <div class="admin-sidebar-bottom">
        <button onclick="handleAdminLogout()" class="btn btn-outline btn-sm" style="border-color:var(--error); color:var(--error); width:100%; display:flex; align-items:center; justify-content:center; gap:6px;">
          <i data-lucide="log-out" style="width:14px; height:14px;"></i> Log Out
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="admin-content-area">
      <!-- Title Row -->
      <div class="admin-title-row">
        <div>
          <h2 style="font-size: 1.75rem;">Manage Divisions</h2>
          <p style="font-size: 0.9rem; color: var(--gray-dark);">Add, edit, or remove therapeutic categories/divisions.</p>
        </div>
      </div>
      
      <div style="display: grid; grid-template-columns: 350px 1fr; gap: var(--spacing-lg); align-items: start;" id="adminCategoryGrid">
      
      <!-- Left Column: Add / Edit Form Card -->
      <div style="background-color: var(--white); padding: var(--spacing-md); border-radius: var(--radius-lg); border: 1px solid var(--gray-light); box-shadow: var(--shadow-sm);">
        <h3 id="categoryFormTitle" style="font-size: 1.2rem; border-bottom: 1px solid var(--gray-light); padding-bottom: 0.5rem; margin-bottom: 1rem;">Add Division</h3>
        
        <form id="categoryForm" onsubmit="saveCategory(event)">
          <input type="hidden" id="formCategoryId">
          
          <div class="form-group">
            <label class="form-label" for="categoryName">Division Name *</label>
            <input type="text" id="categoryName" class="form-control" placeholder="e.g. Tablets, Injections" required>
          </div>
          
          <div class="form-group" style="margin-bottom: var(--spacing-md);">
            <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; cursor: pointer;">
              <input type="checkbox" id="categoryStatus" style="width: 18px; height: 18px; cursor: pointer;" checked>
              Active Division
            </label>
          </div>
          
          <div style="display: flex; gap: 0.5rem;">
            <button type="button" class="btn btn-outline btn-sm" style="flex: 1;" onclick="resetCategoryForm()">Clear</button>
            <button type="submit" class="btn btn-primary btn-sm" style="flex: 1.5;" id="saveCategoryBtn">Save Division</button>
          </div>
        </form>
      </div>
      
      <!-- Right Column: Divisions Table List -->
      <div class="admin-table-card">
        <div class="admin-table-header">
          <div class="admin-table-title">Product Categories / Divisions</div>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Division Name</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminCategoriesTableBody">
              <tr>
                <td colspan="3" style="text-align: center; color: var(--gray-dark);">Loading categories table...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
    </main>
  </div>

  <!-- Custom Alert Toast -->
  <div class="toast-notification" id="toastBox">
    <i data-lucide="info" id="toastIcon"></i>
    <span id="toastMsg">Notification message</span>
  </div>

  <style>
    @media (max-width: 992px) {
      #adminCategoryGrid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

  <!-- Lucide Script -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/admin.js"></script>
  
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
